services:
  - type: web
    name: global-vendor-scout
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -W ignore -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: GEMINI_API_KEY
        sync: false
