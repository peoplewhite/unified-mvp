<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Global Vendor Scout{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-icon">🚀</span>
                <span>Global Vendor Scout</span>
            </a>
            <ul class="nav-menu">
                <li><a href="/" class="nav-link">首頁</a></li>
                <li><a href="/vendor" class="nav-link">Vendor Scout</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>© 2025 Global Vendor Scout - AI Global Vendor Scout</p>
        </div>
    </footer>

    <script src="/static/app.js"></script>
</body>
</html>
